name: Profile cbds with func 20, 6x, small, matcutest

on:
  # Trigger the workflow on push or pull request
  # push:
  # Trigger the workflow manually
  schedule:
  - cron: '0 18 15 * *'
  workflow_dispatch:

jobs:
  test:
    name: Profile cbds with func window size 20, tol 06, small, matcutest
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        matlab: [R2024b]
        dim: [small]
        plibs: [matcutest]
        with_optim_toolbox: [yes]
        feature: [plain, perturbed_x0_0.001, perturbed_x0_1, perturbed_x0_10, perturbed_x0_100, noisy_1e-1, noisy_1e-2, noisy_1e-3, noisy_1e-4, permuted, linearly_transformed, random_nan_5, random_nan_10, random_nan_20, quantized_1, quantized_2, quantized_3, quantized_4, rotation_noisy_1e-1, rotation_noisy_1e-2, rotation_noisy_1e-3, rotation_noisy_1e-4]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Checkout OptiProfiler
        uses: actions/checkout@v4
        with:
          repository: optiprofiler/optiprofiler
          path: optiprofiler
          ref: 5a19e88cc34f9b8925e111934a6b12011422fcdb

      - name: Install Texlive
        run: sudo apt-get update && sudo apt-get install texlive

      - name: Check whether LaTeX is installed
        run: pdflatex --version

      - name: Cache MATLAB
        id: cache-matlab
        uses: actions/cache@v4
        with:
          path: ${{ runner.tool_cache }}/MATLAB
          key: ${{ matrix.os }}-${{ matrix.matlab }}-${{ matrix.with_optim_toolbox }}

      - name: Set up MATLAB with optimization toolbox
        if: ${{ matrix.with_optim_toolbox == 'yes' }}
        uses: matlab-actions/setup-matlab@v3.0.1
        with:
          release: ${{ matrix.matlab }}
          products: Optimization_Toolbox

      - name: Run test
        uses: matlab-actions/run-command@v2.1.1
        with:
            command: |
              root_dir = pwd()
              ls
  
              % Setup optiprofiler
              cd(fullfile(root_dir, 'optiprofiler'));
              setup(struct('install_matcutest', true));
              cd(root_dir);
  
              % Setup bds
              setup
              cd(fullfile(root_dir, 'tests', 'competitors'));
              addpath(pwd);
  
              % profile
              addpath(fullfile(root_dir, 'tests'));
              cd(fullfile(root_dir, 'tests', 'tuning'));
              parameters.func_window_size = [20 1e8];
              parameters.func_tol = [1e-6 1e-30];
              options = struct();
              options.solver_names = {'cbds-tuning-func', 'cbds-default'};
              options.plibs = '${{ matrix.plibs }}';
              options.dim = '${{ matrix.dim }}';
              options.feature_name = '${{ matrix.feature }}';
              tuning_optiprofiler(parameters, options);
              cd(root_dir);


      - name: Change the summary file name
        run: |
          cd ./tests/tuning/tuning_data
          ls -R
          find . -type f -name 'summary.pdf' | while read -r file; do
            # Obtain the parent directory and name
            parent_dir=$(dirname "$file")
            parent_name=$(basename "$parent_dir")

            # Strip the trailing timestamp from the profile directory name.
            new_name=$(bash "$GITHUB_WORKSPACE/tests/tools/strip_profile_timestamp.sh" "$parent_name")

            # Print the new name
            echo "New name: $new_name"

            # Obtain the directory name
            dir_name=$(dirname "$file")
            
            # Establish the new file name
            new_file="$dir_name/summary_$new_name.pdf"
            
            # Check if the source and destination are the same
            if [ "$file" != "$new_file" ]; then
              mv "$file" "$new_file"
              echo "Renamed $file to $new_file"
            else
              echo "Source and destination are the same, skipping: $file"
            fi
          done

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        env:
          BASE_INFO: ${{ env.BASE_INFO }}
        with:
          name: merged_profiles_cbds_func_window_size_20_tol_06_small_matcutest
          path: ./tests/tuning/tuning_data/**

      - name: Upload summary files
        uses: actions/upload-artifact@v4
        env:
          BASE_INFO: ${{ env.BASE_INFO }}
        with:
          name: summary_files_cbds_func_window_size_20_tol_06_small_matcutest
          path: ./tests/tuning/tuning_data/downloaded_artifacts/summary_cbds_func_window_size_20_tol_06_small_matcutest/**
