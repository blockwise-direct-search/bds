name: Test the correctness of gradient estimation

on:
  # Trigger the workflow on push or pull request
  push:
  # Trigger the workflow manually
  # schedule:
  #   - cron: '0 18 * * *'
  workflow_dispatch:

jobs:
  test:
    name: Test the correctness of gradient estimation
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        matlab: [R2023b, R2024a, R2024b, latest]
        with_optim_toolbox: [no]

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Cache MATLAB
        id: cache-matlab
        uses: actions/cache@v5
        with:
          path: ${{ runner.tool_cache }}/MATLAB
          key: ${{ matrix.os }}-${{ matrix.matlab }}-${{ matrix.with_optim_toolbox }}

      - name: Set up MATLAB 
        uses: matlab-actions/setup-matlab@v2.1.2
        with:
          release: ${{ matrix.matlab }}

      - name: Run unit test
        uses: matlab-actions/run-command@v2.1.1
        with:
          command: |
            root_dir = pwd()

            % Add the directory where test_gradient.m is located
            addpath(fullfile(root_dir, 'src', 'private'));

            % Run gradient test
            test_gradient();
