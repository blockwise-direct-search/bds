name: Profile cbds with grad 01, 6x, small, matcutest

on:
  # Trigger the workflow on push or pull request
  # push:
  # Trigger the workflow manually
  schedule:
  - cron: '0 18 15 * *'
  workflow_dispatch:

jobs:
  # 第一阶段：并行运行测试 (产生 15 个独立文件)
  test:
    name: Profile cbds with grad 01, tol 06, small, matcutest
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        matlab: [R2024b]
        dim: [small]
        plibs: [matcutest]
        with_optim_toolbox: [yes]
        feature: [plain, perturbed_x0_0.001, perturbed_x0_1, perturbed_x0_10, perturbed_x0_100, noisy_1e-1, noisy_1e-2, noisy_1e-3, noisy_1e-4, permuted, linearly_transformed, rotation_noisy_1e-1, rotation_noisy_1e-2, rotation_noisy_1e-3, rotation_noisy_1e-4]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Checkout OptiProfiler
        uses: actions/checkout@v4
        with:
          repository: optiprofiler/optiprofiler
          path: optiprofiler
          ref: 5a19e88cc34f9b8925e111934a6b12011422fcdb

      - name: Install Texlive
        run: sudo apt-get update && sudo apt-get install texlive

      - name: Check whether LaTeX is installed
        run: pdflatex --version

      - name: Cache MATLAB
        id: cache-matlab
        uses: actions/cache@v5
        with:
          path: ${{ runner.tool_cache }}/MATLAB
          key: ${{ matrix.os }}-${{ matrix.matlab }}-${{ matrix.with_optim_toolbox }}

      - name: Set up MATLAB with optimization toolbox
        if: ${{ matrix.with_optim_toolbox == 'yes' }}
        uses: matlab-actions/setup-matlab@v2.1.2
        with:
          release: ${{ matrix.matlab }}
          products: Optimization_Toolbox

      - name: Run test
        uses: matlab-actions/run-command@v2.1.1
        with:
            command: |
              root_dir = pwd()
              % Setup optiprofiler
              cd(fullfile(root_dir, 'optiprofiler'));
              setup(struct('install_matcutest', true));
              cd(root_dir);
              % Setup bds
              setup
              cd(fullfile(root_dir, 'tests', 'competitors'));
              addpath(pwd);
              % profile
              addpath(fullfile(root_dir, 'tests'));
              cd(fullfile(root_dir, 'tests', 'tuning'));
              parameters.grad_window_size = [1 1e8];
              parameters.grad_tol = [1e-6 1e-30];
              options = struct();
              options.solver_names = {'cbds-tuning-grad', 'cbds-default'};
              options.plibs = '${{ matrix.plibs }}';
              options.dim = '${{ matrix.dim }}';
              options.feature_name = '${{ matrix.feature }}';
              tuning_optiprofiler(parameters, options);
              cd(root_dir);

      - name: Change the summary file name
        run: |
          cd ./tests/tuning/tuning_data
          find . -type f -name 'summary.pdf' | while read -r file; do
            parent_dir=$(dirname "$file")
            parent_name=$(basename "$parent_dir")
            # Strip the trailing timestamp from the profile directory name.
            new_name=$(bash "$GITHUB_WORKSPACE/tests/tools/strip_profile_timestamp.sh" "$parent_name")
            dir_name=$(dirname "$file")
            new_file="$dir_name/summary_$new_name.pdf"
            if [ "$file" != "$new_file" ]; then
              mv "$file" "$new_file"
            fi
          done

      # 修正点 1：使用唯一的 Artifact 名字，防止覆盖
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: profile_optiprofiler_cbds_func_window_size_01_tol_06_${{ matrix.plibs }}_${{ matrix.dim }}_${{ matrix.feature }}
          path: ./tests/tuning/tuning_data/**

  # 第二阶段：合并所有文件 (修复 "No files found" 问题)
  merge_artifacts:
    name: Merge Artifacts
    runs-on: ubuntu-latest
    needs: test
    permissions:
      actions: read
      contents: read
    
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install PDF tools
        run: sudo apt-get update && sudo apt-get install -y poppler-utils

      # 修正点 2：显式下载 Artifacts，创建 downloaded_artifacts 目录
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: tests/tuning/tuning_data/downloaded_artifacts

      - name: Merge PDF files
        run: |
          cp tests/tools/merge_pdf.sh tests/tuning/tuning_data/downloaded_artifacts
          cd tests/tuning/tuning_data/downloaded_artifacts/
          
          # 注意：这里的 grep 需要根据你的 artifact 名字调整
          ARTIFACT_NAME=$(ls | grep "profile_optiprofiler" | head -n 1)
          BASE_INFO=$(echo $ARTIFACT_NAME | sed -n 's/.*optiprofiler_\([^_]*_[^_]*_\(small\|big\|large\)\).*/\1/p')
          BASE_INFO=$(echo $BASE_INFO | sed 's/-/_/g')
          echo "BASE_INFO=${BASE_INFO}" >> $GITHUB_ENV

          mkdir summary
          for f in $(find . -maxdepth 3 -type f -name 'summary*.pdf'); do
              if [ ! -f "summary/$(basename $f)" ]; then
                  cp "$f" summary/
              fi
          done
          
          cd summary
          bash ../merge_pdf.sh
          # 这里修改了最终合并文件的名字以匹配 grad/small 场景
          mv merged.pdf "summary_cbds_func_window_size_01_tol_06_small_matcutest.pdf"
          cd ..
          if [ -d "summary" ]; then
            mv summary "summary_cbds_func_window_size_01_tol_06_small_matcutest"
          fi

      - name: Upload merged artifact
        uses: actions/upload-artifact@v4
        with:
          name: merged_profiles_cbds_func_window_size_01_tol_06_small_matcutest
          path: tests/tuning/tuning_data/downloaded_artifacts/**

      - name: Upload summary files
        uses: actions/upload-artifact@v4
        with:
          name: summary_files_cbds_func_window_size_01_tol_06_small_matcutest
          path: tests/tuning/tuning_data/downloaded_artifacts/summary_cbds_func_window_size_01_tol_06_small_matcutest/**
